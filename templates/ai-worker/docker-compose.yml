services:
  __PROJECT__:
    image: ${APP_IMAGE:?set in .env}
    container_name: __PROJECT__
    restart: unless-stopped
    # build บนเครื่องแทน registry: clone app ไว้ที่ ./src แล้วเปิดบรรทัดล่าง (ดู docs/19-cicd.md)
    # build: ./src
    command: ${WORKER_COMMAND:?set in .env}
    env_file: .env
    networks:
      - backend
    # Worker AI กิน RAM ได้เยอะ — จำกัดไว้กันลากทั้งเครื่อง (ปรับตามงาน)
    mem_limit: ${WORKER_MEM_LIMIT:-2g}
    cpus: ${WORKER_CPUS:-2}

networks:
  backend:
    external: true
    name: backend
