# Alertmanager — ส่ง alert จาก Prometheus เข้า Telegram
#
# ⚠️ แก้ค่า CHANGE_ME "บนเซิร์ฟเวอร์เท่านั้น" — อย่า commit token จริงกลับเข้า Git
#    (bot token จาก @BotFather, chat_id จาก https://api.telegram.org/bot<token>/getUpdates)

global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "CHANGE_ME"
        chat_id: 0            # ← ใส่ chat id (ตัวเลข)
        parse_mode: ""
        send_resolved: true
