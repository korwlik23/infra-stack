server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # เก็บ log ของทุก Docker container อัตโนมัติ
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 60s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_image"]
        target_label: image
    pipeline_stages:
      # Docker's JSON log format supplies the timestamp used by the age filter.
      - docker: {}
      # Prevent historical backlog entries from being rejected and retried by Loki.
      - drop:
          older_than: 1h
          drop_counter_reason: line_too_old
