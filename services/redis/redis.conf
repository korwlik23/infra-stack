# Redis production config — cache / queue / session
# password ถูกส่งผ่าน --requirepass ใน compose (จาก .env)

# Persistence: AOF ปลอดภัยกว่า RDB สำหรับ queue
appendonly yes
appendfsync everysec

# Memory: กันไม่ให้ Redis กิน RAM ทั้งเครื่อง (ปรับตามสเปก VPS)
maxmemory 512mb
maxmemory-policy allkeys-lru

# Network — container network เท่านั้น ห้าม expose ออก internet
bind 0.0.0.0
protected-mode yes

# ปิดคำสั่งอันตรายใน production
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
