services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD:?set in .env}"]
    environment:
      - TZ=${TZ:-Asia/Bangkok}
      # ต้องมีใน container ด้วย — healthcheck ใช้ $REDIS_PASSWORD ตอนรัน redis-cli
      - REDIS_PASSWORD=${REDIS_PASSWORD:?set in .env}
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  backend:
    external: true
    name: backend
