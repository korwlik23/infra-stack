services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - beszel_data:/beszel_data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.beszel.rule=Host(`servers.${BASE_DOMAIN}`)"
      - "traefik.http.routers.beszel.entrypoints=websecure"
      - "traefik.http.routers.beszel.tls.certresolver=letsencrypt"
      - "traefik.http.services.beszel.loadbalancer.server.port=8090"

  # agent ปิดไว้ default — ถ้าเปิดโดยไม่มี KEY จะ restart loop
  # วิธีเปิด: pair กับ hub ก่อน (README.md) → ใส่ BESZEL_AGENT_KEY ใน .env → เอา # ออก
  # beszel-agent:
  #   image: henrygd/beszel-agent:latest
  #   container_name: beszel-agent
  #   restart: unless-stopped
  #   network_mode: host
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   environment:
  #     - LISTEN=45876
  #     - KEY=${BESZEL_AGENT_KEY:?pair with hub first — see README}

volumes:
  beszel_data:

networks:
  proxy:
    external: true
