# Monitoring stack — Netdata, Prometheus (+exporters), Alertmanager,
# Grafana, Loki+Promtail, Uptime Kuma, Dozzle, Watchtower, Beszel
# Run from repo root:
#   docker compose --env-file .env -f docker/docker-compose.monitoring.yml up -d
include:
  - ../services/netdata/docker-compose.yml
  - ../services/prometheus/docker-compose.yml
  - ../services/postgres-exporter/docker-compose.yml
  - ../services/redis-exporter/docker-compose.yml
  - ../services/alertmanager/docker-compose.yml
  - ../services/grafana/docker-compose.yml
  - ../services/loki/docker-compose.yml
  - ../services/uptime-kuma/docker-compose.yml
  - ../services/dozzle/docker-compose.yml
  - ../services/watchtower/docker-compose.yml
  - ../services/beszel/docker-compose.yml
